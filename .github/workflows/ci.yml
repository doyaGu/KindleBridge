name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable-gates:
    name: Portable release gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        run: cargo test --workspace --all-targets --locked

      - name: Deny Clippy warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run USB lifecycle shell tests
        run: sh scripts/test-shell.sh

      - name: Validate Windows onboarding selector
        shell: pwsh
        run: ./scripts/install-windows-winusb.ps1 -Validate
